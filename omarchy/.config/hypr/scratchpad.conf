# gesture

#Animation for gensture 
# animation = specialWorkspace, 1, 2, default, slide top

workspace = special:peaclock, on-created-empty:[float on; size 1000 800] kitty -e "peaclock", persistent:false

bind = SUPER, C, togglespecialworkspace, peaclock

workspace = special:eimacs, on-created-empty:[float on; size 1000 800] emacsclient -c, persistent:false

bind = SUPER, N, togglespecialworkspace, eimacs

gesture = 3, vertical, special, eimacs

