#### Aquí inician mis cambios

# Control tiling
unbind = SUPER, K
unbind = SUPER, J
unbind = SUPER, H
unbind = SUPER, L
bindd = SUPER ALT, J, Toggle window split, layoutmsg, togglesplit
bindd = SUPER ALT, K, Show key bindings, exec, omarchy-menu-keybindings
# bindd = SUPER, L, Toggle workspace layout, exec, omarchy-hyprland-workspace-layout-toggle
# bindd = SUPER, H, Show key bindings, exec, omarchy-menu-keybindings

# Move focus with SUPER + arrow keys
bindd = SUPER, H, Move window focus left, movefocus, l
bindd = SUPER, L, Move window focus right, movefocus, r
bindd = SUPER, K, Move window focus up, movefocus, u
bindd = SUPER, J, Move window focus down, movefocus, d

# TAB between workspaces
bindd = SUPER ALT, L, Next workspace, workspace, e+1
bindd = SUPER ALT, H, Previous workspace, workspace, e-1
bindd = SUPER ALT, B, Former workspace, workspace, previous

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d


# Resize active window
bindd = SUPER, minus, Expand window left, resizeactive, -100 0    # - key
bindd = SUPER, plus, Shrink window left, resizeactive, 100 0     # = key
bindd = SUPER SHIFT, PLUS, Shrink window up, resizeactive, 0 -100
bindd = SUPER SHIFT, MINUS, Expand window down, resizeactive, 0 100
